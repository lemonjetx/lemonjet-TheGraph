specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: LemonJetGame
    network: base-sepolia
    source:
      address: "0x28f4df2bd04587f0fd979117f46af9cf1f03ddc2"
      abi: LemonJetGame
      startBlock: 35399000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - Game
        - VaultSnapshot
      abis:
        - name: LemonJetGame
          file: ./abis/LemonJetGame.json
      eventHandlers:
        - event: GameReleased(indexed uint256,indexed address,uint256,uint256,uint256)
          handler: handleGameReleased
        - event: GameStarted(indexed uint256,indexed address,uint256,uint256)
          handler: handleGameStarted
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
      file: ./src/lemon-jet-game.ts
