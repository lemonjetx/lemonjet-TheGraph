type Game @entity(immutable: false) {
  id: ID! # requestId as string
  requestId: BigInt!
  playerAddress: Bytes!

  # Fields from GameStarted
  bet: BigInt
  coef: BigInt
  startedBlockNumber: BigInt
  startedBlockTimestamp: BigInt
  startedTransactionHash: Bytes

  # Fields from GameReleased
  payout: BigInt
  randomNumber: BigInt
  x: BigInt
  releasedBlockNumber: BigInt
  releasedBlockTimestamp: BigInt
  releasedTransactionHash: Bytes
}

type VaultSnapshot @entity(immutable: false) {
  id: ID!
  totalAssets: BigInt!
  totalSupply: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
  day: BigInt!
}
